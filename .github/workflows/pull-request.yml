# PRs: Dependency Review ∥ full security pipeline — same `with:` as push `ci.yml` (parity).
name: Pull request checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: pr-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  suite:
    uses: thadiust/workflow-python/.github/workflows/python-pr-suite.yml@main
    with:
      working_directory: "."
      requirements_file: "requirements.txt"
      enforce_pip_tools_lockfile: true
      pip_tools_requirements_in: "requirements.in"
      python_version: "3.11"
      fail_on_vuln: true
      run_pytest: true
      pytest_requirements_file: "requirements.txt"
      pytest_version: "9.0.2"
      run_pip_audit_scan: true
      run_bandit: true
      upload_code_scanning: true
      run_docker_build: true
      dockerfile: Dockerfile
      trivy_image_fail_on_findings: false
