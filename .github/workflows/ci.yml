name: "App CI"

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  security:
    # After you tag workflow-python (e.g. v1.0.0), pin: .../ci.yml@v1.0.0 or @<full-sha> — see monorepo README "What to do next".
    uses: thadiust/workflow-python/.github/workflows/ci.yml@main
    with:
      working_directory: "."
      requirements_file: "requirements.txt"
      python_version: "3.11"
      fail_on_vuln: true
      run_ruff: true
      ruff_version: "0.15.9"
      run_pytest: true
      run_gitleaks: true
      run_pip_audit_scan: true
      run_bandit: true
