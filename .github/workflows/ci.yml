name: "App CI"

permissions:
  contents: read
  security-events: write

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  security:
    # All thadiust/workflow-python refs use @main (floating). Pin @v… only when you need reproducible CI.
    uses: thadiust/workflow-python/.github/workflows/ci.yml@main
    with:
      working_directory: "."
      requirements_file: "requirements.txt"
      enforce_pip_tools_lockfile: true
      pip_tools_requirements_in: "requirements.in"
      python_version: "3.11"
      fail_on_vuln: true
      run_ruff: true
      ruff_version: "0.15.9"
      run_pytest: true
      pytest_requirements_file: "requirements.txt"
      pytest_version: "9.0.2"
      run_gitleaks: true
      run_pip_audit_scan: true
      run_bandit: true
      upload_code_scanning: true
      run_docker_build: true
      dockerfile: Dockerfile
      # Sample app: base images (e.g. python:slim) carry distro CVEs; we still upload trivy-image SARIF.
      # Production services should omit this (default true) or use minimal/distroless images + patching.
      trivy_image_fail_on_findings: false
