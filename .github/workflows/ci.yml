name: "App CI"

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  security:
    # Pinned tag (bump when you release a new workflow-python version). Immutable SHA: 354b4003e32744be7cac4831da80c4c0f291848a
    uses: thadiust/workflow-python/.github/workflows/ci.yml@v1.0.0
    with:
      working_directory: "."
      requirements_file: "requirements.txt"
      python_version: "3.11"
      fail_on_vuln: true
      run_ruff: true
      ruff_version: "0.15.9"
      run_pytest: true
      run_gitleaks: true
      run_pip_audit_scan: true
      run_bandit: true
