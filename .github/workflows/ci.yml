name: "App CI"

permissions:
  contents: read
  security-events: write

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  security:
    # Solo dev: @main tracks workflow-python main (instant updates). Before onboarding others, switch to @vX.Y.Z.
    uses: thadiust/workflow-python/.github/workflows/ci.yml@main
    with:
      working_directory: "."
      requirements_file: "requirements.txt"
      enforce_pip_tools_lockfile: true
      pip_tools_requirements_in: "requirements.in"
      python_version: "3.11"
      fail_on_vuln: true
      run_ruff: true
      ruff_version: "0.15.9"
      run_pytest: true
      pytest_requirements_file: "requirements.txt"
      pytest_version: "9.0.2"
      run_gitleaks: true
      run_pip_audit_scan: true
      run_bandit: true
      upload_code_scanning: true
